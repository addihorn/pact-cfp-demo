services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todos"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/migrations:/migrations
    entrypoint:
      [
        "migrate",
        "-path",
        "/migrations",
        "-database",
        "postgres://todo:todo@postgres:5432/todos?sslmode=disable",
        "up"
      ]

  seed:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./apps/api/seed:/seed
    entrypoint:
      [
        "sh",
        "-c",
        "psql postgresql://todo:todo@postgres:5432/todos -f /seed/seed.sql"
      ]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: docker
      APP_PORT: 8080
      DATABASE_DSN: postgres://todo:todo@postgres:5432/todos?sslmode=disable
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - api
    ports:
      - "5173:5175"

volumes:
  pg_data:
