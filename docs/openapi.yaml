openapi: 3.0.3
info:
  title: Todo API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/todos:
    get:
      summary: List todos
      parameters:
        - in: query
          name: completed
          schema:
            type: boolean
      responses:
        "200":
          description: Todo list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoListResponse"
    post:
      summary: Create todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTodoRequest"
      responses:
        "201":
          description: Created todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoResponse"
  /api/v1/todos/{id}:
    patch:
      summary: Patch todo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchTodoRequest"
      responses:
        "200":
          description: Updated todo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoResponse"
    delete:
      summary: Delete todo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Healthy
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Ready
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics payload
components:
  schemas:
    Todo:
      type: object
      required: [id, title, description, completed, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
    PatchTodoRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
    TodoResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Todo"
    TodoListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Todo"